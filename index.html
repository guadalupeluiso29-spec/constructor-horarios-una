<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Constructor de Horarios</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  height: 100vh;
}

#sidebar {
  width: 300px;
  background: #f4f4f4;
  padding: 15px;
  overflow-y: auto;
  border-right: 1px solid #ccc;
}

#sidebar h3 {
  margin-top: 20px;
  margin-bottom: 10px;
}

#sidebar button {
  display: block;
  width: 100%;
  margin-bottom: 5px;
  padding: 6px;
  cursor: pointer;
  border: 1px solid #ccc;
  background: white;
}

#main {
  flex: 1;
  padding: 20px;
  overflow: auto;
}

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  text-align: center;
  height: 40px;
  position: relative;
}

th {
  background: #eee;
}

.bloque {
  background: lightblue;
  height: 100%;
  width: 100%;
  font-size: 12px;
}
</style>
</head>

<body>

<div id="sidebar">
  <h2>Materias</h2>
  <div id="listaMaterias"></div>

  <h3>Comisiones</h3>
  <div id="listaComisiones"></div>
</div>

<div id="main">
  <h2>Horario</h2>

  <table>
    <thead>
      <tr>
        <th>Hora</th>
        <th>LUNES</th>
        <th>MARTES</th>
        <th>MIERCOLES</th>
        <th>JUEVES</th>
        <th>VIERNES</th>
        <th>SABADO</th>
      </tr>
    </thead>
    <tbody id="tablaHorario">
    </tbody>
  </table>
</div>

<script>
const dias = ["LUNES","MARTES","MIERCOLES","JUEVES","VIERNES","SABADO"]
const inicio = 8
const fin = 23

const tbody = document.getElementById("tablaHorario")

for (let hora = inicio; hora <= fin; hora++) {
  const tr = document.createElement("tr")

  const tdHora = document.createElement("td")
  tdHora.textContent = hora + ":00"
  tr.appendChild(tdHora)

  dias.forEach(dia => {
    const td = document.createElement("td")
    td.setAttribute("data-dia", dia)
    td.setAttribute("data-hora", hora)
    tr.appendChild(td)
  })

  tbody.appendChild(tr)
}
</script>

<script src="app.js"></script>

</body>
</html>
