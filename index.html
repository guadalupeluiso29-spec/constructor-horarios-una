<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Constructor de Horarios - UNA DAV</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */

.sidebar {
  width: 320px;
  border-right: 1px solid #ddd;
  padding: 15px;
  overflow-y: auto;
  background: #fafafa;
}

.sidebar h2 {
  margin-top: 0;
}

.filter {
  margin-bottom: 10px;
  width: 100%;
  padding: 6px;
}

.comision {
  border: 1px solid #ccc;
  padding: 6px;
  margin-bottom: 6px;
  font-size: 13px;
  cursor: pointer;
  background: white;
}

.comision:hover {
  background: #eee;
}

/* CALENDARIO */

.calendar-container {
  flex: 1;
  padding: 20px;
  overflow: auto;
}

#calendar {
  position: relative;
  display: grid;
  grid-template-columns: 80px repeat(6, 1fr);
  border: 1px solid #ccc;
}

.header {
  background: #111;
  color: white;
  text-align: center;
  padding: 5px;
  font-size: 12px;
}

.time {
  font-size: 12px;
  padding: 4px;
  border-top: 1px solid #eee;
}

.cell {
  border: 1px solid #eee;
  height: 50px;
}

.event {
  position: absolute;
  background: #e63946;
  color: white;
  padding: 4px;
  font-size: 11px;
  border-radius: 4px;
  width: 13%;
  overflow: hidden;
}

.top-bar {
  position: absolute;
  top: 10px;
  right: 20px;
}

button {
  padding: 6px 10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Comisiones</h2>

  <input id="filtroMateria" class="filter" placeholder="Materia">
  <input id="filtroSede" class="filter" placeholder="Sede">
  <input id="filtroCatedra" class="filter" placeholder="Cátedra">

  <div id="listaComisiones"></div>
</div>

<div class="calendar-container">
  <button onclick="descargarImagen()">Descargar horario</button>
  <div id="calendar"></div>
</div>

<script src="app.js"></script>

</body>
</html>
