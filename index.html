<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Constructor de Horarios UNA</title>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select, button {
      padding: 8px;
      font-size: 14px;
    }

    #calendar {
      position: relative;
      display: grid;
      grid-template-columns: 80px repeat(6, 1fr);
      border: 1px solid #ccc;
      background: white;
    }

    .header {
      background: #111;
      color: white;
      padding: 5px;
      text-align: center;
      font-size: 13px;
    }

    .time {
      border-top: 1px solid #eee;
      padding: 5px;
      font-size: 12px;
    }

    .cell {
      border: 1px solid #eee;
      height: 50px;
    }

    .event {
      position: absolute;
      background: #111;
      color: white;
      padding: 5px;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
      width: 13%;
      overflow: hidden;
    }

    .event:hover {
      opacity: 0.8;
    }

  </style>
</head>
<body>

  <h1>Constructor de Horarios - UNA DAV</h1>

  <div class="controls">
    <input type="text" id="search" placeholder="Buscar materia...">
    <button onclick="descargarImagen()">Descargar mi horario</button>
  </div>

  <div id="calendar"></div>

  <script src="app.js"></script>

</body>
</html>
